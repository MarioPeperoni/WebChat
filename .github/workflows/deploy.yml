name: Build and Deploy WebChat

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: 'eu-central-1'

jobs:
  cdk-deploy:
    name: Deploy CDK stack
    runs-on: ubuntu-latest
    outputs:
      http_api_url: ${{ steps.outputs.outputs.http_api_url }}
      ws_api_url: ${{ steps.outputs.outputs.ws_api_url }}
      frontend_bucket: ${{ steps.outputs.outputs.frontend_bucket }}
      distribution_id: ${{ steps.outputs.outputs.distribution_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install CDK dependencies
        working-directory: infrastructure/cdk
        run: npm ci

      - name: CDK deploy
        working-directory: infrastructure/cdk
        run: |
          npx cdk deploy WebChatStack --require-approval never \
            --outputs-file cdk-outputs.json

      - name: Export outputs
        id: outputs
        working-directory: infrastructure/cdk
        run: |
          jq -r '.WebChatStack | to_entries[] | "\(.key)=\(.value)"' cdk-outputs.json
          echo "http_api_url=$(jq -r '.WebChatStack.HttpApiUrl' cdk-outputs.json)" >> $GITHUB_OUTPUT
          echo "ws_api_url=$(jq -r '.WebChatStack.WsApiUrl' cdk-outputs.json)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(jq -r '.WebChatStack.FrontendBucketName' cdk-outputs.json)" >> $GITHUB_OUTPUT
          echo "distribution_id=$(jq -r '.WebChatStack.FrontendDistributionId' cdk-outputs.json)" >> $GITHUB_OUTPUT

  frontend:
    name: Build and deploy frontend
    runs-on: ubuntu-latest
    needs: cdk-deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Inject environment variables
        working-directory: ./frontend
        run: |
          echo "VITE_API_URL=https://api.chat.mthings.online" > .env
          echo "VITE_WS_URL=wss://ws.chat.mthings.online" >> .env

      - name: Install dependencies
        working-directory: ./frontend
        run: bun install

      - name: Build static files
        working-directory: ./frontend
        run: bun run build

      - name: Deploy to S3
        env:
          BUCKET: ${{ needs.cdk-deploy.outputs.frontend_bucket }}
        run: aws s3 sync ./frontend/dist s3://$BUCKET --delete

      - name: Invalidate CloudFront
        env:
          DISTRIBUTION_ID: ${{ needs.cdk-deploy.outputs.distribution_id }}
        run: aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths '/*'
